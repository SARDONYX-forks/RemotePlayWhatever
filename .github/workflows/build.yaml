name: Build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false

      matrix:
        # os: [windows-latest, ubuntu-latest, macos-latest]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup MSVC & LLVM(Windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "3.0.6"
          actions-cache-key: ${{ runner.os }}-xmake
          build-cache-key: ${{ runner.os }}-xmake-build

      - name: Build
        shell: pwsh
        run: xmake build -y -vD

      - name: Install
        shell: pwsh
        run: xmake install -o ./build/artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePlayWhatever-${{ matrix.os }}
          path: ./build/artifact/bin/
